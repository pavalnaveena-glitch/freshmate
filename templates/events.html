<!DOCTYPE html>
<html>
<head>

<title>Events</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2 class="text-center mb-4">
Upcoming Events
</h2>

<table class="table table-bordered table-striped">

<tr>

<th>ID</th>

<th>Event</th>

<th>Date</th>

<th>Venue</th>

<th>Description</th>

</tr>

{% for event in events %}

<tr>

<td>{{ event[0] }}</td>

<td>{{ event[1] }}</td>

<td>{{ event[2] }}</td>

<td>{{ event[3] }}</td>

<td>{{ event[4] }}</td>

</tr>

{% endfor %}

</table>

<a href="/dashboard" class="btn btn-primary">
Back
</a>

</div>

</body>
</html>
