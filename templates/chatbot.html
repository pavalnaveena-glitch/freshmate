<!DOCTYPE html>
<html>
<head>
    <title>FreshMate AI Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center">🤖 FreshMate AI Chatbot</h2>

    <form method="POST">
        <div class="mb-3">
            <textarea class="form-control" name="question" rows="4" placeholder="Ask a question..."></textarea>
        </div>

        <button type="submit" class="btn btn-success">
            Ask AI
        </button>
    </form>

    {% if answer %}
    <div class="alert alert-info mt-4">
        <strong>Answer:</strong><br>
        {{ answer }}
    </div>
    {% endif %}

    <br>

    <a href="/dashboard" class="btn btn-primary">
        Back to Dashboard
    </a>

</div>

</body>
</html>
