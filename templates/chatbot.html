<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FreshMate AI Chatbot</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7fb;
            margin:0;
            padding:0;
        }

        .container{
            width:60%;
            margin:40px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
            color:#0077b6;
        }

        input[type=text]{
            width:80%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:6px;
            font-size:16px;
        }

        button{
            padding:12px 20px;
            background:#0077b6;
            color:white;
            border:none;
            border-radius:6px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#005f8d;
        }

        #answer{
            margin-top:25px;
            padding:20px;
            background:#eef7ff;
            border-left:5px solid #0077b6;
            border-radius:6px;
            min-height:80px;
            white-space:pre-wrap;
            font-size:16px;
        }

        .back-btn{
            text-decoration:none;
            display:inline-block;
            margin-bottom:20px;
            color:#0077b6;
            font-weight:bold;
        }

        .loading{
            color:#0077b6;
            font-weight:bold;
        }
    </style>

    <script>
        function showLoading(){
            document.getElementById("answer").innerHTML =
            "<p class='loading'>🤖 FreshMate AI is thinking...</p>";
        }
    </script>

</head>
<body>

<div class="container">

    <a href="/dashboard" class="back-btn">← Back to Dashboard</a>

    <h2>🤖 FreshMate AI Chatbot</h2>

    <form method="POST" onsubmit="showLoading()">

        <input
            type="text"
            name="question"
            placeholder="Ask anything about your college..."
            required>

        <button type="submit">Send</button>

    </form>

    <div id="answer">
        {% if answer %}
            {{ answer }}
        {% else %}
            👋 Hello! I'm FreshMate AI.

            Ask me anything about your college, events, clubs, faculty or timetable.
        {% endif %}
    </div>

</div>

</body>
</html>
